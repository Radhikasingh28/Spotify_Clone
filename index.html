<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>

    <div class="container flex bg-black">


        <!-- Left Section -->
        <div class="left rounded">
            <!-- close -->
            <div class="close">
                <img width="25" class="invert" src="img/close.svg" alt="">
            </div>

            <div class="home bg-grey rounded m1 p1">
                <div class="logo">
                    <img class="invert" src="img/logo.svg" alt="Spotify">
                    <span>Spotify</span>
                </div>

                <ul>
                    <li><img class="invert" src="img/home.svg" alt=""> Home</li>
                    <li><img class="invert" src="img/search.svg" alt=""> Search</li>
                </ul>
            </div>

            <div class="library bg-grey rounded m1 p1">

                <div class="heading">
                    <img class="invert" src="img/playlist.svg" alt="">
                    <h2>Your Library</h2>
                </div>

                <div class="songList">
                    <ul>
                        <li>
                            <img class="invert" src="img/music.svg" alt="">
                            <div class="info">
                                <div>Song Name</div>
                                <div>Song Artist</div>
                            </div>

                            <div class="playnow">
                                <img class="invert" src="img/play.svg" alt="">
                                <span>Play Now</span>
                            </div>

                        </li>
                    </ul>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>

            </div>

        </div>

        <!-- Right Section -->
        <div class="right bg-grey rounded">

            <!-- Header -->
            <div class="header">

                <div class="nav">
                    <div class="hamburgerContainer">

                        <img class="invert hamburger" width="40" src="img/hamburger.svg" alt="">

                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M15 6L9.70711 11.2929C9.37377 11.6262 9.20711 11.7929 9.20711 12C9.20711 12.2071 9.37377 12.3738 9.70711 12.7071L15 18"
                                stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M9 18L14.2929 12.7071C14.6262 12.3738 14.7929 12.2071 14.7929 12C14.7929 11.7929 14.6262 11.6262 14.2929 11.2929L9 6"
                                stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                    </div>
                </div>

                <div class="buttons">
                    <button class="signup">Sign Up</button>
                    <button class="login">Log In</button>
                </div>

            </div>

            <!-- Playlist -->
            <div class="spotifyPlaylist">

                <h2>Spotify Playlist</h2>

                <div class="cardContainer"></div>



                <!-- Playbar -->
                <div class="playbar">

                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>

                    <!-- <div class="abovebar">

                    <div class="songinfo"></div>

                    <div class="songbuttons">
                        <img width="35" id="previous" src="img/prevsong.svg" alt="">
                        <img width="35" id="play" src="img/play.svg" alt="">
                        <img width="35" id="next" src="img/nextsong.svg" alt="">
                    </div>
                    <div class="timevol"></div>

                    <div class="songtime"></div>
                    <div class="volume">
                        <img src="img/volume.svg">
                        <div class="range">
                            <input type="range" name="volume" id="vol">
                        </div>
                        
                    </div>

                </div> -->
                    <div class="abovebar">

                        <div class="songinfo"></div>

                        <div class="songbuttons">
                            <img width="35" id="previous" src="img/prevsong.svg" alt="">
                            <img width="35" id="play" src="img/play.svg" alt="">
                            <img width="35" id="next" src="img/nextsong.svg" alt="">
                        </div>

                        <div class="timevol">

                            <div class="songtime"></div>

                            <div class="volume">
                                <img src="img/volume.svg">
                                <input type="range" name="volume" id="vol">
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <script src="javaScript.js"></script>

</body>

</html>
